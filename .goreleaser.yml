---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
archives:
  - id: archive
    name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
builds:
  - binary: external-dns-anexia-webhook
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goarch:
      - amd64
      - arm64
      - arm
    goos:
      - darwin
      - windows
      - linux
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm
    ldflags:
      - -X 'main.Version={{ .Tag }}'
      - -X 'main.Gitsha={{ .ShortCommit }}'
    main: ./cmd/webhook
source:
  enabled: true
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - "--output-certificate=${certificate}"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: all
    output: true
sboms:
  - artifacts: archive
  - id: source
    artifacts: source
dockers_v2:
  - images:
      - "ghcr.io/anexia/k8s-external-dns-webhook"
    tags:
      - "latest"
      - "{{ .Env.CI_COMMIT_SHA }}"
      - "{{ .Env.CI_COMMIT_TAG }}"
    build_args:
      CI_COMMIT_TIMESTAMP: "{{ .Env.CI_COMMIT_TIMESTAMP }}"
      CI_COMMIT_SHA: "{{ .Env.CI_COMMIT_SHA }}"
      CI_COMMIT_TAG: "{{ .Env.CI_COMMIT_TAG }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
changelog:
  disable: true
  use: github
  filters:
    exclude:
      - "^docs"
      - "^chore"
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bugfixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: Other Work
      order: 999
release:
  disable: false
  prerelease: auto
snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT"
